version: "3.9"

# Shared environment defaults across services.
x-common-env: &common-env
  NODE_ENV: production
  RPC_URL: ${RPC_URL:-https://api.devnet.solana.com}
  RPC_WS_URL: ${RPC_WS_URL:-wss://api.devnet.solana.com}
  PROGRAM_ID: ${PROGRAM_ID:-VuhEhakwgobFN7L3fJJJCu4HTrV1mahAt8MUxiPnxwB}
  DB_PATH: /data/sss.db
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  # ── API service ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: sss-backend:latest
    container_name: sss-api
    restart: unless-stopped
    environment:
      <<: *common-env
      MODE: api
      PORT: "3000"
      ADMIN_API_KEY: ${ADMIN_API_KEY:-changeme}
      WEBHOOK_SECRET_KEY: ${WEBHOOK_SECRET_KEY:-changeme_webhook}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - sss-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - indexer

  # ── Indexer service ───────────────────────────────────────────────────────────
  indexer:
    image: sss-backend:latest
    container_name: sss-indexer
    restart: unless-stopped
    environment:
      <<: *common-env
      MODE: indexer
      # Optional: comma-separated config pubkeys to watch; empty = watch all
      WATCH_CONFIGS: ${WATCH_CONFIGS:-}
    volumes:
      - sss-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Webhook worker service ────────────────────────────────────────────────────
  worker:
    image: sss-backend:latest
    container_name: sss-worker
    restart: unless-stopped
    environment:
      <<: *common-env
      MODE: worker
      WEBHOOK_CONCURRENCY: ${WEBHOOK_CONCURRENCY:-5}
      WEBHOOK_POLL_INTERVAL_MS: ${WEBHOOK_POLL_INTERVAL_MS:-2000}
    volumes:
      - sss-data:/data
    depends_on:
      - indexer

volumes:
  sss-data:
    driver: local
